---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: mariadb-to-external-home
spec:
  sourcePVC: storage-nextcloud-mariadb-0
  trigger:
    schedule: "10 8 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: nextcloud-external-home-mariadb-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      weekly: 2
      monthly: 3
