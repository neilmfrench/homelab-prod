---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-argo-workflows
  namespace: flux-system
spec:
  path: ./kubernetes/apps/production/argocd/argo-workflows/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-source
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: argo-workflows
      namespace: argocd
  interval: 30m
  retryInterval: 1m
  timeout: 10m
