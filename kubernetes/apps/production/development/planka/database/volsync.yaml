---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: postgresql-to-external-home
spec:
  sourcePVC: planka-postgresql-1
  trigger:
    schedule: "0 9 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: planka-external-home-postgresql-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      weekly: 2
      monthly: 3
