---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: pocketbase-data
spec:
  sourcePVC: pocketbase-data
  trigger:
    schedule: "0 7 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: pocketbase-data-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      within: 3d
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: pocketbase-data-to-external-home
spec:
  sourcePVC: pocketbase-data
  trigger:
    schedule: "50 8 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: pocketbase-data-external-home-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      weekly: 2
      monthly: 3
