---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: bookstack-data
spec:
  sourcePVC: bookstack-config
  trigger:
    schedule: "0 7 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: bookstack-data-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      within: 3d
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: bookstack-data-to-external-home
spec:
  sourcePVC: bookstack-config
  trigger:
    schedule: "40 8 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: bookstack-data-external-home-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      weekly: 2
      monthly: 3
