---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
spec:
  values:
    config:
      clientID: "${SECRET_SOFTWARE_FACTORY_HUB_OAUTH2_CLIENT_ID}"
      clientSecret: "${SECRET_SOFTWARE_FACTORY_HUB_OAUTH2_CLIENT_SECRET}"
      cookieSecret: "${SECRET_SOFTWARE_FACTORY_HUB_COOKIE_SECRET}"
      configFile: |-
        email_domains = [ "*" ]
        upstreams = [ "http://software-factory-hub-frontend.development.svc.cluster.local:3000" ]
        provider = "oidc"
        insecure_oidc_allow_unverified_email = true
        provider_display_name = "OpenID Connect"
        redirect_url = "https://sfh.${SECRET_DOMAIN}/oauth2/callback"
        pass_access_token = true
        pass_authorization_header = true
        cookie_secure = false
        oidc_issuer_url = "https://id.${SECRET_DOMAIN}/application/o/software-factory-hub/"
        scope = "openid profile email"
    ingress:
      enabled: true
      className: traefik
      path: /
      hosts:
        - "sfh.${SECRET_DOMAIN}"
    sessionStorage:
      type: cookie
