---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: software-factory-hub-frontend
spec:
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: harbor-global-ro
    controllers:
      frontend:
        containers:
          app:
            image:
              repository: "harbor.${SECRET_DOMAIN}/eee/sfh/frontend"
              tag: "1.0.0"
              pullPolicy: IfNotPresent
            env:
              BACKEND_URL: http://software-factory-hub-backend.development.svc.cluster.local:7007
    service:
      app:
        controller: frontend
        ports:
          http:
            port: 3000
