apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    educates.dev/infra-provider: generic
    kapp.k14s.io/change-group.global: educates-installer
    kapp.k14s.io/change-group.package: educates-installer/educates
    kapp.k14s.io/disable-original: ""
  name: session-manager
  namespace: educates
spec:
  replicas: 1
  selector:
    matchLabels:
      deployment: session-manager
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        deployment: session-manager
    spec:
      automountServiceAccountToken: false
      containers:
      - image: ghcr.io/educates/educates-session-manager@sha256:3aa79b926897494a4fbabb4c9e29509a52d562a8a0c6966d612a5d650b6c0d60
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz?probe=liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: operator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          failureThreshold: 4
          httpGet:
            path: /healthz?probe=startup
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        volumeMounts:
        - mountPath: /opt/app-root/config/
          name: config
        - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          name: token
          readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: session-manager
      volumes:
      - name: config
        secret:
          secretName: educates-config
      - name: token
        secret:
          secretName: session-manager-token
