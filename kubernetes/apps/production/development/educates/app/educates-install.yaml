apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    educates.dev/infra-provider: generic
    kapp.k14s.io/change-group.global: educates-installer
    kapp.k14s.io/change-group.package: educates-installer/educates
    kapp.k14s.io/disable-original: ""
  name: secrets-manager
  namespace: educates
spec:
  replicas: 1
  selector:
    matchLabels:
      deployment: secrets-manager
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        deployment: secrets-manager
    spec:
      automountServiceAccountToken: false
      containers:
      - image: ghcr.io/educates/educates-secrets-manager@sha256:1b83c95b4d9e0ed7299b1752f2cb97413f09fd091bf3ea2a61ec6cc3b670b963
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz?probe=liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        name: operator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          failureThreshold: 4
          httpGet:
            path: /healthz?probe=startup
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /opt/app-root/config/
          name: config
        - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          name: token
          readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: secrets-manager
      volumes:
      - name: config
        secret:
          secretName: educates-config
      - name: token
        secret:
          secretName: secrets-manager-token
---
