---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: authentik-postgres-to-external-home
spec:
  sourcePVC: authentik-postgresql-1
  trigger:
    schedule: "15 8 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: authentik-external-home-restic-config
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    storageClassName: ceph-block
    retain:
      daily: 7
      weekly: 2
      monthly: 3
