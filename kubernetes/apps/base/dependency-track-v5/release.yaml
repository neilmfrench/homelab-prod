---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dependency-track-v5
spec:
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://dependencytrack.github.io/helm-charts
      chart: hyades
      version: 0.23.0
      sourceRef:
        kind: HelmRepository
        name: dependency-track
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
