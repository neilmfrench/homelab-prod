---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sbom-operator
spec:
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://ckotzbauer.github.io/helm-charts
      chart: sbom-operator
      version: 0.44.5
      sourceRef:
        kind: HelmRepository
        name: ckotzbauer
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
