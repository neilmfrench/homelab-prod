---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: uptime-kuma-data-to-external-home
spec:
  sourcePVC: uptime-kuma-data-daily-backup 
  trigger:
    schedule: "30 8 * * *"
  restic:
    copyMethod: Snapshot
    pruneIntervalDays: 7
    repository: uptime-kuma-data-external-home-restic-config
    volumeSnapshotClassName: longhorn-snapshot-vsc
    storageClassName: longhorn-volsync
    retain:
      daily: 7
      weekly: 2
      monthly: 3
