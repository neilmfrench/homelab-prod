---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-infrastructure-tailscale-operator
  namespace: flux-system
spec:
  path: ./kubernetes/infrastructure/staging-sj/tailscale/tailscale-operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-source
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: tailscale-operator
      namespace: tailscale
  interval: 30m
  retryInterval: 1m
  timeout: 3m
