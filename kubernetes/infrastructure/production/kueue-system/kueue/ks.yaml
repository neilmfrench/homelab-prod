---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-infrastructure-kueue
  namespace: flux-system
spec:
  path: ./kubernetes/infrastructure/production/kueue-system/kueue/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-source
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kueue
      namespace: kueue-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-infrastructure-kueue-config
  namespace: flux-system
spec:
  path: ./kubernetes/infrastructure/production/kueue-system/kueue/config
  dependsOn:
    - name: cluster-infrastructure-kueue
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-source
  interval: 30m
  retryInterval: 1m
  timeout: 5m
