---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: thanos
spec:
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: quay.io
      repository: thanos/thanos
      tag: v0.40.1
    objstoreConfig:
      type: s3
      config:
        insecure: true
    queryFrontend:
      enabled: true
      resourcesPreset: "none"
      replicaCount: 3
      ingress:
        enabled: true
        ingressClassName: traefik
        hostname: &host thanos.${SECRET_DOMAIN}
        tls: true
        extraTls:
          - hosts:
              - *host
    query:
      enabled: true
      resourcesPreset: "none"
      replicaCount: 3
      replicaLabel: ["__replica__"]
      dnsDiscovery:
        sidecarsService: kube-prometheus-stack-thanos-discovery
        sidecarsNamespace: monitoring
    bucketweb:
      enabled: true
      resourcesPreset: "none"
      replicaCount: 3
    compactor:
      enabled: true
      nodeSelector:
        kubernetes.io/hostname: talos-5
      resources:
        requests:
          cpu: 250m
          memory: 1Gi
        limits:
          memory: 12Gi
      concurrency: 4
      extraFlags:
        - --delete-delay=30m
        - --compact.enable-vertical-compaction
        - --downsample.concurrency=4
        - --downsampling.disable
      retentionResolutionRaw: 30d
      retentionResolution5m: 90d
      retentionResolution1h: 90d
      persistence:
        enabled: false
    storegateway:
      enabled: true
      resourcesPreset: "none"
      replicaCount: 3
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 20Gi
    ruler:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  valuesFrom:
    - targetPath: objstoreConfig.config.bucket
      kind: ConfigMap
      name: thanos-bucket
      valuesKey: BUCKET_NAME
    - targetPath: objstoreConfig.config.endpoint
      kind: ConfigMap
      name: thanos-bucket
      valuesKey: BUCKET_HOST
    - targetPath: objstoreConfig.config.region
      kind: ConfigMap
      name: thanos-bucket
      valuesKey: BUCKET_REGION
    - targetPath: objstoreConfig.config.access_key
      kind: Secret
      name: thanos-bucket
      valuesKey: AWS_ACCESS_KEY_ID
    - targetPath: objstoreConfig.config.secret_key
      kind: Secret
      name: thanos-bucket
      valuesKey: AWS_SECRET_ACCESS_KEY
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: thanos-compactor
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: thanos-compactor
              spec:
                template:
                  spec:
                    volumes:
                      - name: data
                        emptyDir:
                          sizeLimit: 400Gi
